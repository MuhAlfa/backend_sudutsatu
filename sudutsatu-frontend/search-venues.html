<!DOCTYPE html>
<html lang="id">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   Cari Lapangan - SudutSatu
  </title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11">
  </script>
  <link href="assets/css/style.css" rel="stylesheet"/>
  <link href="assets/css/pages/search-venues.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
 </head>
 <body class="user-body">
  <header class="user-navbar">
   <div class="container navbar-inner">
    <div class="navbar-logo">
     <span class="text-primary">
      Sudut
     </span>
     Satu
    </div>
    <nav class="nav-links d-flex gap-32">
     <a class="nav-item active" href="search-venues.html">
      Cari Lapangan
     </a>
     <a class="nav-item" href="dashboard-user.html">
      Dashboard
     </a>
     <a class="nav-item" href="profile.html">
      Profil
     </a>
     <a class="nav-item" href="tentang-kami.html">
      Tentang Kami
     </a>
     <a class="nav-item" href="hubungi-kami.html">
      Hubungi Kami
     </a>
    </nav>
    <div class="nav-actions d-flex align-center gap-16">
     <div class="nav-profile-wrapper d-flex align-center gap-12">
      <div class="nav-profile-text text-right" id="desktopProfileText">
       <div class="text-white" style="font-size: 14px; font-weight: 600;">
    
       </div>
      </div>
      <div class="nav-avatar position-relative">
       <img alt="User" src="assets/images/avatar.jpg" style="width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid #ccff00;"/>
      </div>
     </div>
    </div>
   </div>
  </header>
  <main class="container py-32 search-layout">
   <aside class="filter-sidebar">
    <div class="flex-between align-center mb-24">
     <h3 class="text-white m-0 d-flex align-center gap-8">
      <svg fill="none" height="18" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="18">
       <line x1="4" x2="4" y1="21" y2="14">
       </line>
       <line x1="4" x2="4" y1="10" y2="3">
       </line>
       <line x1="12" x2="12" y1="21" y2="12">
       </line>
       <line x1="12" x2="12" y1="8" y2="3">
       </line>
       <line x1="20" x2="20" y1="21" y2="16">
       </line>
       <line x1="20" x2="20" y1="12" y2="3">
       </line>
       <line x1="1" x2="7" y1="14" y2="14">
       </line>
       <line x1="9" x2="15" y1="8" y2="8">
       </line>
       <line x1="17" x2="23" y1="16" y2="16">
       </line>
      </svg>
      Filters
     </h3>
     <button class="btn-text text-muted text-tiny uppercase tracking-wide" id="btnResetFilter">
      RESET
     </button>
    </div>
    <div class="filter-group mb-24">
     <label class="filter-title">
      JENIS OLAHRAGA
     </label>
     <label class="custom-checkbox">
      <input class="filter-olahraga" type="checkbox" value="Futsal"/>
      <span class="checkmark">
      </span>
      <span class="text-white">
       Futsal
      </span>
      <span class="text-muted ml-auto text-small">
       1
      </span>
     </label>
     <label class="custom-checkbox">
      <input class="filter-olahraga" type="checkbox" value="Biliard"/>
      <span class="checkmark">
      </span>
      <span class="text-white">
       Biliard
      </span>
      <span class="text-muted ml-auto text-small">
       1
      </span>
     </label>
    </div>
    <div class="filter-group mb-24">
     <label class="filter-title">
      KETERSEDIAAN WAKTU
     </label>
     <div class="time-pills">
      <button class="time-pill" data-waktu="Pagi">
       Pagi
      </button>
      <button class="time-pill" data-waktu="Siang">
       Siang
      </button>
      <button class="time-pill" data-waktu="Sore">
       Sore
      </button>
      <button class="time-pill" data-waktu="Malam">
       Malam
      </button>
     </div>
    </div>
   </aside>
   <section class="search-content">
    <div class="search-header-box mb-24">
     <div class="flex-between align-center mb-16">
      <div>
       <h1 class="text-white m-0 mb-4" style="font-size: 28px;">
        Hasil Pencarian
       </h1>
       <p class="text-muted m-0 text-small">
        Menampilkan
        <span class="text-primary bold" id="countHasil">
         0
        </span>
        lapangan ditemukan
       </p>
      </div>
      <div class="d-flex align-center gap-12">
       <span class="text-muted text-small uppercase tracking-wide">
        SORT BY:
       </span>
       <select class="custom-select-dark" id="sortLapangan">
        <option value="rekomendasi">
         Rekomendasi
        </option>
        <option value="termurah">
         Harga: Termurah
        </option>
        <option value="termahal">
         Harga: Termahal
        </option>
       </select>
      </div>
     </div>
     <div class="search-bar-dark">
      <svg fill="none" height="18" stroke="#888" stroke-width="2" viewBox="0 0 24 24" width="18">
       <circle cx="11" cy="11" r="8">
       </circle>
       <line x1="21" x2="16.65" y1="21" y2="16.65">
       </line>
      </svg>
      <input id="inputCariNama" placeholder="Cari nama lapangan (misal: Court A, Sintetis)..." type="text"/>
     </div>
    </div>
    <div class="active-filters d-flex align-center gap-8 mb-24 flex-wrap" id="activeFilterContainer">
     <span class="text-muted text-tiny uppercase tracking-wide mr-8">
      ACTIVE:
     </span>
    </div>
    <div class="venue-grid" id="venueGrid">
    </div>
   </section>
  </main>
  <script src="assets/js/global.js">
  </script>
  <script src="assets/js/pages/search-venues.js">
  </script>
 </body>
</html>
