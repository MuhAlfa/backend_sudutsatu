<!DOCTYPE html>
<html lang="id">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   Masuk - SudutSatu
  </title>
  <link href="../../assets/css/pages/auth.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
 </head>
 <body>
  <main class="login-container">
   <!-- LEFT SIDE -->
   <section class="login-brand">
    <h1>
     SUDUT SATU.
    </h1>
    <p>
     Precision booking for professional-grade facilities.
                Join the elite network of active sports enthusiasts.
    </p>
   </section>
   <!-- RIGHT SIDE -->
   <section class="login-form-section">
    <form class="login-form" id="loginForm">
     <h2>
      MASUK
     </h2>
     <div class="form-group">
      <label for="email">
       EMAIL
      </label>
      <input id="email" placeholder="Enter your email" required="" type="email"/>
     </div>
     <div class="form-group">
      <div class="label-row">
       <label for="password">
        PASSWORD
       </label>
       <a class="forgot-link" href="forgot-password.html">
        LUPA PASSWORD?
       </a>
      </div>
      <input id="password" placeholder="Enter your password" required="" type="password"/>
     </div>
     <button class="btn-primary" type="submit">
      MASUK
     </button>
     <p class="bottom-link">
      Belum bergabung?
      <a href="register.html">
       DAFTAR SEKARANG
      </a>
     </p>
     <div id="message">
     </div>
    </form>
   </section>
  </main>
  <script src="../../assets/js/pages/auth.js">
  </script>
  <script src="../../script.js">
  </script>
 </body>
</html>
