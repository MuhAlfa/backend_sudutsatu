<!DOCTYPE html>
<html lang="id">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   Daftar - SudutSatu
  </title>
  <link href="../../assets/css/pages/auth.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
 </head>
 <body>
  <main class="login-container">
   <section class="login-brand">
    <h1>
     SUDUT SATU.
    </h1>
    <p>
     Bergabunglah dengan komunitas olahraga terbaik
                dan nikmati pengalaman booking yang lebih mudah.
    </p>
   </section>
   <section class="login-form-section">
    <form class="login-form" id="registerForm">
     <h2>
      DAFTAR
     </h2>
     <div class="form-group">
      <label>
       Nama Lengkap
      </label>
      <input id="fullName" placeholder="Masukkan nama lengkap" required="" type="text"/>
     </div>
     <div class="form-group">
      <label>
       Email
      </label>
      <input id="email" placeholder="Masukkan email" required="" type="email"/>
     </div>
     <div class="form-group">
      <label>
       Nomor Telepon
      </label>
      <input id="phone" placeholder="08xxxxxxxxxx" required="" type="text"/>
     </div>
     <div class="form-group">
      <label>
       Password
      </label>
      <input id="password" required="" type="password"/>
     </div>
     <div class="form-group">
      <label>
       Konfirmasi Password
      </label>
      <input id="confirmPassword" required="" type="password"/>
     </div>
     <button class="btn-primary" type="submit">
      DAFTAR
     </button>
     <p class="bottom-link">
      Sudah punya akun?
      <a href="login.html">
       MASUK
      </a>
     </p>
     <div id="message">
     </div>
    </form>
   </section>
  </main>
  <script src="../../assets/js/pages/auth.js">
  </script>
  <script src="../../script.js">
  </script>
 </body>
</html>
