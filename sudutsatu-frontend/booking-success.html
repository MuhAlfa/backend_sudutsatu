<!DOCTYPE html>
<html lang="id">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   Pembayaran Berhasil - SudutSatu
  </title>
  <link href="assets/css/style.css" rel="stylesheet"/>
  <link href="assets/css/pages/success.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
 </head>
 <body class="success-body">
  <header class="user-navbar">
   <div class="container flex-between align-center py-16">

   </div>
  </header>
  <main class="success-layout">
   <div class="success-content">
    <div class="check-icon-wrapper">
     <div class="check-box">
      <div class="check-circle">
       ✔
      </div>
     </div>
    </div>
    <h1 class="success-title">
     Pembayaran Berhasil!
    </h1>
    <p class="success-subtitle">
     Siapkan diri anda untuk pertandingan terbaik!
    </p>
    <div class="booking-receipt">
     <div class="receipt-header">
      DETAIL BOOKING
     </div>
     <div class="receipt-row">
      <span>
       Booking ID
      </span>
      <strong class="text-white" id="bId">
       SS-00000
      </strong>
     </div>
     <div class="receipt-row">
      <span>
       Venue
      </span>
      <strong class="text-white" id="bVenue">
       Memuat...
      </strong>
     </div>
     <div class="receipt-row">
      <span>
       Tanggal
      </span>
      <strong class="text-white" id="bDate">
       Memuat...
      </strong>
     </div>
     <div class="receipt-row">
      <span>
       Waktu
      </span>
      <strong class="text-white" id="bTime">
       Memuat...
      </strong>
     </div>
     <hr class="divider"/>
     <div class="receipt-row align-center mt-16 total-row">
      <span>
       Total Dibayar
      </span>
      <strong class="text-primary text-xl" id="bPaid">
       Rp 0
      </strong>
     </div>
    </div>
    <div class="success-actions">
     <button class="btn btn-primary btn-icon-text" onclick="const params = new URLSearchParams(window.location.search); const id = params.get('id'); window.location.href = 'e-ticket.html' + (id ? '?id=' + encodeURIComponent(id) : '');">
      <span class="icon">
       🎫
      </span>
      Lihat Tiket
     </button>
     <button class="btn btn-outline btn-icon-text" onclick="window.location.href='dashboard-user.html'">
      <span class="icon">
       ⌂
      </span>
      Ke Dashboard
     </button>
    </div>
   </div>
  </main>
  <script src="assets/js/pages/success.js">
  </script>
 </body>
</html>
