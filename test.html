<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tes Register & Login SudutSatu</title>
</head>
<body>
    <h2>Form Tes Registrasi (Back-End SudutSatu)</h2>
    <form id="registerForm">
        <input type="text" id="regName" placeholder="Nama Lengkap" required><br><br>
        <input type="email" id="regEmail" placeholder="Email" required><br><br>
        <input type="password" id="regPassword" placeholder="Password" required><br><br>
        <button type="submit">Daftar (Register)</button>
    </form>

    <hr>

    <h2>Form Tes Login</h2>
    <form id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email" required><br><br>
        <input type="password" id="loginPassword" placeholder="Password" required><br><br>
        <button type="submit">Masuk (Login)</button>
    </form>

    <h3>Respon Server:</h3>
    <pre id="jsonResult" style="background: #eee; padding: 10px;">Belum ada aksi...</pre>

    <script>
        // JALUR REGISTRASI
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            const res = await fetch('http://localhost:5000/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });
            const data = await res.json();
            document.getElementById('jsonResult').innerText = JSON.stringify(data, null, 2);
        });

        // JALUR LOGIN
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            const res = await fetch('http://localhost:5000/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            document.getElementById('jsonResult').innerText = JSON.stringify(data, null, 2);
        });
    </script>
</body>
</html>
